name: Build and Deploy Resume

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
      - '**.cls'
      - '**.sty'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 编译 PDF
      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume_cn.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error -file-line-error"

      # 1.5 重命名 PDF 文件
      - name: Rename PDF
        run: mv resume_cn.pdf ZhangXiaoliang_CV.pdf

      # 2. 将 PDF 转换为高清晰度图片
      - name: Convert PDF to PNG
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # 修改 ImageMagick 权限策略以允许处理 PDF
          sudo sed -i 's/policy domain="coder" rights="none" pattern="PDF"/policy domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          
          # 转换为 300 DPI 的高清图片，分别导出两页
          convert -density 300 ZhangXiaoliang_CV.pdf[0] -quality 100 resume_preview_0.png
          convert -density 300 ZhangXiaoliang_CV.pdf[1] -quality 100 resume_preview_1.png

      # 3. 自动更新 README 内容
      - name: Update README
        run: |
          echo "# 个人简历 (Resume)" > README.md
          echo "" >> README.md
          echo "> 💡 提示：下方为简历预览图，最新完整版请点击：[📄 下载 PDF 版本](./ZhangXiaoliang_CV.pdf)" >> README.md
          echo "" >> README.md
          echo "[![Resume Preview Page 1](./resume_preview_0.png)](./ZhangXiaoliang_CV.pdf)" >> README.md
          echo "" >> README.md
          echo "[![Resume Preview Page 2](./resume_preview_1.png)](./ZhangXiaoliang_CV.pdf)" >> README.md

      # 4. 自动提交并推送
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update resume PDF and preview image [skip ci]"
          file_pattern: 'ZhangXiaoliang_CV.pdf resume_preview_0.png resume_preview_1.png README.md'